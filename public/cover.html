<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>青途智红：AI赋能青年学子革命旧址沉浸式研学育人平台</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --deep-red: #7A0010;
    --crimson: #B22222;
    --red: #C41E3A;
    --gold: #C9A96E;
    --gold-light: #E8D5B7;
    --dark: #0D0D0D;
    --darker: #050505;
    --cream: #F5F0E8;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow-x: hidden;
    display: flex;
    justify-content: center;
  }

  /* Canvas for the cover */
  .cover {
    position: relative;
    width: 1440px;
    height: 1920px;
    background: radial-gradient(ellipse at 50% 30%, #1a0a0a 0%, #0a0202 40%, #000 100%);
    overflow: hidden;
  }

  /* Background texture - grain overlay */
  .grain {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.6;
    pointer-events: none;
    z-index: 1;
  }

  /* China map silhouette */
  .china-silhouette {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(2.8);
    width: 500px; height: 450px;
    opacity: 0.06;
    z-index: 2;
    pointer-events: none;
  }

  /* Decorative lines */
  .top-line {
    position: absolute;
    top: 120px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--crimson), var(--gold), transparent);
    opacity: 0.4;
    z-index: 3;
  }

  .bottom-line {
    position: absolute;
    bottom: 200px;
    left: 120px;
    right: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--crimson), var(--gold), transparent);
    opacity: 0.3;
    z-index: 3;
  }

  /* Vertical accent bar */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 90px;
    width: 2px;
    height: 100%;
    background: linear-gradient(180deg, transparent 5%, var(--crimson) 20%, var(--gold) 50%, var(--crimson) 80%, transparent 95%);
    opacity: 0.3;
    z-index: 3;
  }

  .accent-bar-right {
    left: auto;
    right: 90px;
  }

  /* Golden star decoration */
  .star-decor {
    position: absolute;
    z-index: 3;
    opacity: 0.15;
  }
  .star-decor.top { top: 180px; right: 180px; width: 60px; height: 60px; }
  .star-decor.bottom { bottom: 300px; left: 200px; width: 40px; height: 40px; }

  /* Content container */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 0 180px;
  }

  /* Top section - competition tag */
  .competition-tag {
    margin-top: 140px;
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: fadeInUp 1s ease-out 0.2s forwards;
  }

  .tag-line {
    width: 40px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }

  .tag-text {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* Main title area */
  .title-block {
    margin-top: 80px;
    text-align: center;
    opacity: 0;
    animation: fadeInUp 1s ease-out 0.5s forwards;
  }

  .project-type {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--gold-light);
    margin-bottom: 40px;
    opacity: 0.7;
  }

  .main-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 140px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 12px;
    background: linear-gradient(180deg, #D4A574 0%, #C41E3A 40%, #8B0000 70%, #4a0000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 4px 40px rgba(180,30,30,0.3));
  }

  .subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: 8px;
    color: var(--gold-light);
    margin-top: 30px;
    opacity: 0.85;
  }

  /* Divider */
  .divider-group {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 60px;
    opacity: 0;
    animation: fadeInUp 1s ease-out 0.8s forwards;
  }

  .divider-line {
    width: 80px;
    height: 1px;
    background: var(--crimson);
    opacity: 0.6;
  }

  .divider-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  /* Feature grid */
  .features {
    margin-top: 80px;
    display: flex;
    gap: 48px;
    opacity: 0;
    animation: fadeInUp 1s ease-out 1.1s forwards;
  }

  .feature-item {
    text-align: center;
    width: 180px;
  }

  .feature-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    background: rgba(180,30,30,0.08);
    transition: all 0.4s ease;
  }

  .feature-item:hover .feature-icon {
    border-color: var(--gold);
    background: rgba(180,30,30,0.18);
    box-shadow: 0 0 40px rgba(196,30,58,0.2);
    transform: translateY(-4px);
  }

  .feature-label {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--gold);
  }

  .feature-desc {
    font-size: 13px;
    font-weight: 300;
    color: rgba(232,213,183,0.6);
    margin-top: 8px;
    letter-spacing: 2px;
    line-height: 1.6;
  }

  /* Bottom section */
  .bottom-info {
    margin-top: auto;
    margin-bottom: 100px;
    display: flex;
    align-items: center;
    gap: 40px;
    opacity: 0;
    animation: fadeInUp 1s ease-out 1.4s forwards;
  }

  .bottom-item {
    text-align: center;
  }

  .bottom-item .label {
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(232,213,183,0.4);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .bottom-item .value {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--gold-light);
  }

  .bottom-sep {
    width: 1px;
    height: 30px;
    background: rgba(201,169,110,0.2);
  }

  /* Animated particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-300px) scale(1.5); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }

  /* Road map line behind title */
  .road-line {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 300px;
    z-index: 2;
    opacity: 0.05;
    pointer-events: none;
    border: 1px dashed var(--gold);
    border-radius: 50%;
    border-bottom: none;
  }

  /* Responsive scaling */
  @media (max-width: 1440px) {
    .cover { transform: scale(0.8); transform-origin: top center; height: 1536px; }
  }
  @media (max-width: 1200px) {
    .cover { transform: scale(0.65); transform-origin: top center; height: 1248px; }
  }
  @media (max-width: 768px) {
    .cover { transform: scale(0.4); transform-origin: top center; height: 768px; }
  }
</style>
</head>
<body>

<div class="cover">

    <path d="M15,20 L25,15 L35,10 L50,5 L65,8 L75,8 L80,10 L85,12 L88,15 L90,18 L92,22 L93,28 L92,32 L90,35 L88,38 L85,40 L82,42 L78,45 L75,48 L72,52 L70,55 L68,58 L65,60 L62,58 L58,55 L55,52 L52,50 L50,48 L48,45 L45,42 L42,40 L38,38 L35,36 L32,34 L28,32 L25,30 L22,28 L18,25 L15,22 Z" fill="white"/>

<!-- Download button -->
<div style="position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:999;display:flex;gap:12px;">
  <button onclick="downloadCover('png')" style="padding:14px 36px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#C41E3A,#8B0000);color:white;box-shadow:0 4px 20px rgba(196,30,58,0.4);">
    ⬇ 下载 PNG 封面
  </button>
  <button onclick="downloadCover('jpg')" style="padding:14px 36px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#D4A574,#C9A96E);color:#333;box-shadow:0 4px 20px rgba(201,169,110,0.4);">
    ⬇ 下载 JPG 封面
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
async function downloadCover(format) {
  const cover = document.querySelector('.cover');
  const canvas = await html2canvas(cover, {
    scale: 1,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#000000',
    width: 1440,
    height: 1920,
  });
  const mime = format === 'jpg' ? 'image/jpeg' : 'image/png';
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `青途智红_封面.${format}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, mime, 0.95);
}
</script>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280">
  <defs>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="40%" stop-color="#C41E3A"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#A08050"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="120" cy="120" r="108" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Inner decorative circle -->
  <circle cx="120" cy="120" r="98" fill="none" stroke="#C41E3A" stroke-width="1" opacity="0.3"/>

  <!-- Map route lines (abstract path) -->
  <path d="M50,80 Q80,60 120,70 Q160,80 180,60 Q190,50 180,40"
        fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Route dots -->
  <circle cx="50" cy="80" r="5" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="120" cy="70" r="5" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="180" cy="40" r="5" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Main character "红" -->
  <text x="120" y="180"
        font-family="'Noto Serif SC','SimSun','STSong',serif"
        font-size="130" font-weight="900"
        text-anchor="middle"
        fill="url(#mainGrad)"
        filter="url(#glow)">红</text>

  <!-- Secondary text "途" smaller, offset -->
  <text x="120" y="240"
        font-family="'Noto Serif SC','SimSun','STSong',serif"
        font-size="38" font-weight="700"
        text-anchor="middle"
        fill="url(#goldGrad)"
        letter-spacing="20">途</text>

  <!-- Small star -->
  <polygon points="215,30 218,38 226,38 219,43 222,52 215,47 208,52 211,43 204,38 212,38"
           fill="url(#goldGrad)" opacity="0.8"/>

  <!-- Bottom decorative dots -->
  <circle cx="60" cy="260" r="1.5" fill="#C9A96E" opacity="0.4"/>
  <circle cx="80" cy="262" r="2" fill="#C41E3A" opacity="0.3"/>
  <circle cx="160" cy="262" r="2" fill="#C41E3A" opacity="0.3"/>
  <circle cx="180" cy="260" r="1.5" fill="#C9A96E" opacity="0.4"/>
</svg>
